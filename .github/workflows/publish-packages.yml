name: Publish Package Repositories

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (default: YYYYMMDD of today)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Compute the release version once so all downstream jobs share the same tag.
  # ---------------------------------------------------------------------------
  version:
    name: Set Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - name: Compute version
        id: set-version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "${VERSION}" ]; then
            VERSION="$(date +%Y%m%d)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

  # ---------------------------------------------------------------------------
  # Build packages using the existing reusable workflows.
  # ---------------------------------------------------------------------------
  build-rpm:
    name: Build RPM
    needs: version
    uses: ./.github/workflows/build-rpm.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  build-deb:
    name: Build DEB
    needs: version
    uses: ./.github/workflows/build-deb.yml
    with:
      version: ${{ needs.version.outputs.version }}

  build-apk:
    name: Build APK
    needs: version
    uses: ./.github/workflows/build-apk.yml
    with:
      version: ${{ needs.version.outputs.version }}

  # ---------------------------------------------------------------------------
  # Generate repository metadata and publish to gh-pages branch.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to GitHub Pages
    needs: [version, build-rpm, build-deb, build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download RPM artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-rpm.outputs.artifact-name }}
          path: packages/rpm/

      - name: Download DEB artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-deb.outputs.artifact-name }}
          path: packages/deb/

      - name: Download APK artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build-apk.outputs.artifact-name }}
          path: packages/apk/

      - name: List downloaded packages
        run: find packages/ -type f | sort

      # -----------------------------------------------------------------------
      # YUM / DNF repository
      # -----------------------------------------------------------------------
      - name: Generate YUM repository metadata
        run: |
          sudo apt-get update -q
          sudo apt-get install -y createrepo-c

          mkdir -p publish/yum/rpms
          cp packages/rpm/*.rpm publish/yum/rpms/

          # Copy GPG public key if available from the RPM build artifact
          if [ -f packages/rpm/RPM-GPG-KEY-amentum ]; then
            cp packages/rpm/RPM-GPG-KEY-amentum publish/yum/RPM-GPG-KEY-amentum
          fi

          createrepo_c publish/yum/rpms/

      - name: Check GPG key availability
        id: gpg-check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_PRIVATE_KEY}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Export and publish GPG public key
        if: steps.gpg-check.outputs.available == 'true'
        id: gpg-export
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Import GPG key and export the public key to the publish directory
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import

          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "gpg-key-id=${GPG_KEY_ID}" >> "${GITHUB_OUTPUT}"

          gpg --armor --export "${GPG_KEY_ID}" > publish/yum/RPM-GPG-KEY-amentum
          echo "GPG public key exported to publish/yum/RPM-GPG-KEY-amentum"

      - name: Sign YUM repository metadata
        if: steps.gpg-check.outputs.available == 'true'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Sign the repomd.xml
          gpg --batch --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
            -u "${{ steps.gpg-export.outputs.gpg-key-id }}" \
            --detach-sign --armor publish/yum/rpms/repodata/repomd.xml

      - name: Verify GPG key is present
        run: |
          if [ -f publish/yum/RPM-GPG-KEY-amentum ]; then
            echo "✅ GPG public key will be published at yum/RPM-GPG-KEY-amentum"
            echo "Key fingerprint:"
            gpg --show-keys publish/yum/RPM-GPG-KEY-amentum 2>/dev/null \
              || cat publish/yum/RPM-GPG-KEY-amentum | head -5
          else
            echo "⚠️  WARNING: No GPG public key available for publishing!"
            echo "The RPM repository will be configured without GPG verification."
          fi

      - name: Create YUM repo configuration file
        run: |
          REPO_BASE_URL="https://amentumcms.github.io/Amentum-Certs/yum"
          if [ -f publish/yum/RPM-GPG-KEY-amentum ]; then
            cat > publish/yum/amentum-certs.repo <<-REPO
          [amentum-certs]
          name=Amentum Root CA Certificates
          baseurl=${REPO_BASE_URL}/rpms/
          enabled=1
          gpgcheck=1
          gpgkey=${REPO_BASE_URL}/RPM-GPG-KEY-amentum
          REPO
          else
            cat > publish/yum/amentum-certs.repo <<-REPO
          [amentum-certs]
          name=Amentum Root CA Certificates
          baseurl=${REPO_BASE_URL}/rpms/
          enabled=1
          gpgcheck=0
          REPO
          fi

      # -----------------------------------------------------------------------
      # APT repository
      # -----------------------------------------------------------------------
      - name: Generate APT repository metadata
        run: |
          CODENAME="stable"
          COMPONENT="main"
          ARCH="all"

          # Pool directory
          mkdir -p "publish/apt/pool/${COMPONENT}"
          cp packages/deb/*.deb "publish/apt/pool/${COMPONENT}/"

          # Binary index
          DIST_DIR="publish/apt/dists/${CODENAME}/${COMPONENT}/binary-${ARCH}"
          mkdir -p "${DIST_DIR}"

          cd publish/apt
          dpkg-scanpackages "pool/${COMPONENT}" /dev/null \
            > "dists/${CODENAME}/${COMPONENT}/binary-${ARCH}/Packages"
          gzip -k "dists/${CODENAME}/${COMPONENT}/binary-${ARCH}/Packages"

          # Release file
          cd "dists/${CODENAME}"

          {
            echo "Origin: Amentum"
            echo "Label: Amentum Certs"
            echo "Suite: ${CODENAME}"
            echo "Codename: ${CODENAME}"
            echo "Architectures: ${ARCH}"
            echo "Components: ${COMPONENT}"
            echo "Description: Amentum root CA certificate packages"
            echo "MD5Sum:"
            for f in ${COMPONENT}/binary-${ARCH}/Packages ${COMPONENT}/binary-${ARCH}/Packages.gz; do
              HASH=$(md5sum "$f" | awk '{print $1}')
              SIZE=$(stat -c%s "$f")
              echo " ${HASH} ${SIZE} ${f}"
            done
            echo "SHA256:"
            for f in ${COMPONENT}/binary-${ARCH}/Packages ${COMPONENT}/binary-${ARCH}/Packages.gz; do
              HASH=$(sha256sum "$f" | awk '{print $1}')
              SIZE=$(stat -c%s "$f")
              echo " ${HASH} ${SIZE} ${f}"
            done
          } > Release

          cd ../../../..

      # -----------------------------------------------------------------------
      # Alpine APK repository
      # -----------------------------------------------------------------------
      - name: Generate APK repository index
        run: |
          mkdir -p publish/apk/x86_64
          cp packages/apk/*.apk publish/apk/x86_64/

          # Use Alpine container to generate the APKINDEX
          docker run --rm \
            -v "$(pwd)/publish/apk/x86_64:/repo" \
            alpine:latest sh -c '
              apk add --no-cache alpine-sdk
              cd /repo
              apk index --allow-untrusted -o APKINDEX.tar.gz *.apk
            '

      # -----------------------------------------------------------------------
      # Add an index page for GitHub Pages
      # -----------------------------------------------------------------------
      - name: Create index page
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          cat > publish/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
          <head><title>Amentum Certificate Package Repositories</title></head>
          <body>
          <h1>Amentum Certificate Package Repositories</h1>
          <ul>
            <li><a href="yum/">YUM/DNF Repository (RHEL/CentOS/Rocky/Alma)</a></li>
            <li><a href="apt/">APT Repository (Debian/Ubuntu)</a></li>
            <li><a href="apk/">APK Repository (Alpine Linux)</a></li>
          </ul>
          <h2>GPG Signing Key</h2>
          <ul>
            <li><a href="yum/RPM-GPG-KEY-amentum">RPM GPG Public Key</a></li>
            <li><a href="yum/amentum-certs.repo">YUM/DNF Repository Configuration File</a></li>
          </ul>
          <h2>Quick Setup (RHEL/CentOS/Rocky/Alma)</h2>
          <pre>
          sudo curl -o /etc/yum.repos.d/amentum-certs.repo \
            https://amentumcms.github.io/Amentum-Certs/yum/amentum-certs.repo
          sudo dnf install amentum-certs
          </pre>
          </body>
          </html>
          EOF

      # -----------------------------------------------------------------------
      # Deploy to gh-pages branch
      # -----------------------------------------------------------------------
      - name: Deploy to gh-pages
        run: |
          cd publish
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish package repositories (version ${{ needs.version.outputs.version }})"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push -f origin gh-pages

  # ---------------------------------------------------------------------------
  # Verify published GitHub Pages URLs are accessible.
  # ---------------------------------------------------------------------------
  verify-pages:
    name: Verify Published Pages
    needs: [version, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for GitHub Pages deployment
        run: |
          echo "Waiting for GitHub Pages to propagate..."
          RETRIES=12
          DELAY=15
          URL="https://amentumcms.github.io/Amentum-Certs/"
          for i in $(seq 1 ${RETRIES}); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${URL}" || echo "000")
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "✅ GitHub Pages is live (attempt ${i}/${RETRIES})"
              break
            fi
            echo "Attempt ${i}/${RETRIES}: HTTP ${HTTP_CODE} — retrying in ${DELAY}s..."
            sleep "${DELAY}"
          done
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "⚠️  Pages may not be fully propagated yet, continuing with tests..."
          fi

      - name: Verify index page
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/")
          echo "Index page: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ Index page not accessible"
            exit 1
          fi
          echo "✅ Index page is accessible"

      - name: Verify GPG public key
        run: |
          HTTP_CODE=$(curl -s -o /tmp/gpg-key -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/yum/RPM-GPG-KEY-amentum")
          echo "GPG key: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ GPG public key not accessible at yum/RPM-GPG-KEY-amentum"
            exit 1
          fi
          # Verify it looks like a valid GPG key
          if grep -q "BEGIN PGP PUBLIC KEY BLOCK" /tmp/gpg-key; then
            echo "✅ GPG public key is valid and accessible"
          else
            echo "❌ Downloaded file does not appear to be a valid GPG public key"
            cat /tmp/gpg-key
            exit 1
          fi

      - name: Verify YUM repo config
        run: |
          HTTP_CODE=$(curl -s -o /tmp/repo-file -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/yum/amentum-certs.repo")
          echo "Repo config: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ YUM repo config not accessible"
            exit 1
          fi
          # Verify it contains expected content
          if grep -q "\[amentum-certs\]" /tmp/repo-file; then
            echo "✅ YUM repo config is valid and accessible"
            cat /tmp/repo-file
          else
            echo "❌ Repo config does not contain expected content"
            cat /tmp/repo-file
            exit 1
          fi

      - name: Verify YUM repodata
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/yum/rpms/repodata/repomd.xml")
          echo "repomd.xml: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ YUM repodata not accessible"
            exit 1
          fi
          echo "✅ YUM repodata is accessible"

      - name: Verify APT repository
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/apt/dists/stable/Release")
          echo "APT Release: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ APT Release file not accessible"
            exit 1
          fi
          echo "✅ APT Release file is accessible"

      - name: Verify APK repository
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://amentumcms.github.io/Amentum-Certs/apk/x86_64/APKINDEX.tar.gz")
          echo "APKINDEX: HTTP ${HTTP_CODE}"
          if [ "${HTTP_CODE}" -ne 200 ]; then
            echo "❌ APK index not accessible"
            exit 1
          fi
          echo "✅ APK index is accessible"

      - name: Test RPM GPG key import (simulated)
        run: |
          # Download and verify the key can be processed by gpg
          curl -sS -o /tmp/RPM-GPG-KEY-amentum \
            "https://amentumcms.github.io/Amentum-Certs/yum/RPM-GPG-KEY-amentum"
          gpg --import /tmp/RPM-GPG-KEY-amentum
          echo "✅ GPG key can be imported successfully"

      - name: Test YUM/DNF repository setup (Rocky Linux container)
        run: |
          docker run --rm rockylinux:9 bash -c '
            set -e
            echo "=== Importing GPG key ==="
            rpm --import https://amentumcms.github.io/Amentum-Certs/yum/RPM-GPG-KEY-amentum
            echo "✅ GPG key imported successfully"

            echo ""
            echo "=== Installing repo config ==="
            curl -so /etc/yum.repos.d/amentum-certs.repo \
              https://amentumcms.github.io/Amentum-Certs/yum/amentum-certs.repo
            cat /etc/yum.repos.d/amentum-certs.repo

            echo ""
            echo "=== Testing dnf repolist ==="
            dnf repolist --repo=amentum-certs
            echo "✅ Repository is recognized by dnf"

            echo ""
            echo "=== Testing package installation ==="
            dnf install -y amentum-certs
            echo "✅ Package installed successfully from repository"
          '

      - name: Test APT repository setup (Debian container)
        run: |
          docker run --rm debian:bookworm bash -c '
            set -e
            apt-get update -qq
            apt-get install -y -qq curl ca-certificates > /dev/null

            echo "=== Adding APT repository ==="
            echo "deb [trusted=yes] https://amentumcms.github.io/Amentum-Certs/apt/ stable main" \
              > /etc/apt/sources.list.d/amentum-certs.list
            cat /etc/apt/sources.list.d/amentum-certs.list

            echo ""
            echo "=== Updating package lists ==="
            apt-get update -qq

            echo ""
            echo "=== Installing package ==="
            apt-get install -y amentum-certs
            echo "✅ Package installed successfully from APT repository"
          '

      - name: Test APK repository setup (Alpine container)
        run: |
          # NOTE: --allow-untrusted is required because the APK repository uses
          # an ephemeral signing key generated during CI builds. Proper persistent
          # APK signing is not yet configured for the published repository.
          docker run --rm alpine:latest sh -c '
            set -e
            echo "=== Adding APK repository ==="
            echo "https://amentumcms.github.io/Amentum-Certs/apk/x86_64" \
              >> /etc/apk/repositories
            cat /etc/apk/repositories

            echo ""
            echo "=== Updating package index ==="
            apk update --allow-untrusted

            echo ""
            echo "=== Installing package ==="
            apk add --allow-untrusted amentum-certs
            echo "✅ Package installed successfully from APK repository"
          '
