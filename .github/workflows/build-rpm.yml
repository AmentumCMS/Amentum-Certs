name: Build RPM Package

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'certs/**'
      - 'scripts/build-rpm.sh'
      - '.github/workflows/build-rpm.yml'
  workflow_call:
    inputs:
      version:
        description: 'Package version (YYYYMMDD format)'
        type: string
        required: false
        default: ''
    secrets:
      GPG_PRIVATE_KEY:
        description: 'GPG private key for RPM signing (ASCII-armored)'
        required: false
      GPG_PASSPHRASE:
        description: 'Passphrase for the GPG private key'
        required: false
    outputs:
      artifact-name:
        description: 'Name of the uploaded RPM artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

permissions:
  contents: read

jobs:
  build:
    name: Build and Test RPM
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    outputs:
      artifact-name: ${{ steps.artifact-meta.outputs.artifact-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          dnf install -y rpm-build rpmdevtools rpm-sign ca-certificates p11-kit-trust openssl gnupg2

      - name: Set version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "${VERSION}" ]; then
            VERSION="$(date +%Y%m%d)"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build RPM
        run: |
          chmod +x scripts/build-rpm.sh
          ./scripts/build-rpm.sh "${{ steps.version.outputs.version }}"

      - name: Check GPG key availability
        id: gpg-check
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_PRIVATE_KEY}" ]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Import GPG key and sign RPM
        if: steps.gpg-check.outputs.available == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import the GPG private key
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import

          # Get the GPG key ID
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long 2>/dev/null \
            | grep '^sec' | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "Signing with GPG key: ${GPG_KEY_ID}"

          # Configure RPM macros for signing
          cat > ~/.rpmmacros <<-MACROS
          %_signature gpg
          %_gpg_name ${GPG_KEY_ID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback --passphrase-fd 3 --no-armor --no-verbose -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          MACROS

          # Sign all RPMs
          for rpm_file in amentum-certs-*.rpm; do
            echo "Signing ${rpm_file}..."
            rpm --addsign "${rpm_file}" 3<<< "${GPG_PASSPHRASE}"
          done

          # Verify the signature
          rpm --checksig amentum-certs-*.rpm

          # Export the public key for publishing
          gpg --armor --export "${GPG_KEY_ID}" > RPM-GPG-KEY-amentum
          echo "GPG public key exported to RPM-GPG-KEY-amentum"

      - name: Test RPM installation
        run: |
          echo "=== Installing RPM package ==="
          rpm -ivh amentum-certs-*.rpm

          echo ""
          echo "=== Refreshing CA trust store ==="
          update-ca-trust extract

          echo ""
          echo "=== Installed Amentum certificate files ==="
          rpm -ql amentum-certs | grep '/etc/pki/ca-trust/source/anchors/' \
            || echo "(no certificate files installed in this build)"

          echo ""
          echo "=== Installed certificate subjects ==="
          rpm -ql amentum-certs | grep '/etc/pki/ca-trust/source/anchors/' | while IFS= read -r cert; do
            [ -f "${cert}" ] || continue
            echo "  $(openssl x509 -noout -subject -in "${cert}" 2>/dev/null || echo "${cert}")"
          done

      - name: Set artifact metadata
        id: artifact-meta
        run: |
          echo "artifact-name=rpm-package-${{ steps.version.outputs.version }}" \
            >> "${GITHUB_OUTPUT}"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v7
        with:
          name: rpm-package-${{ steps.version.outputs.version }}
          path: |
            *.rpm
            RPM-GPG-KEY-amentum
          if-no-files-found: error
          retention-days: 30
